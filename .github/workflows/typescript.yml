name: TypeScript

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install dependencies
        run: npm ci
      - name: Test
        run: npm run test
      - name: Codecov
        uses: codecov/codecov-action@v6
        with:
          fail_ci_if_error: true
          use_oidc: true
